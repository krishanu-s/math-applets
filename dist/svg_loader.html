<!-- math-applets/dist/svg_loader.html -->
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SVG Loader Demo</title>
        <base href="." />
        <script>
            MathJax = {
                tex: {
                    inlineMath: { "[+]": [["$", "$"]] },
                },
            };
        </script>
        <script
            defer
            src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-svg.js"
        ></script>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
            }
            .canvas-container {
                margin: 20px 0;
                border: 1px solid #ccc;
                padding: 10px;
            }
        </style>
    </head>
    <body>
        <h1>SVG Loader Demo</h1>
        <p>This demo loads SVG files and extracts points from them.</p>

        <div id="svg-loader-demo" class="canvas-container">
            <!-- Canvas will be inserted here -->
        </div>

        <script type="module" src="svg_loader_scene.js"></script>

        <div id="mathjax-svg-parser" class="canvas-container">
            <!-- Canvas will be inserted here -->
        </div>

        <!--<script type="module" src="mathjax_svg_parser_scene.js"></script>-->
    </body>
</html>
